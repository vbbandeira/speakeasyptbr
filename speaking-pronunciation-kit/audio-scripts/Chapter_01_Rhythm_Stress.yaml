# Chapter 1 — Rhythm & Stress
# 4 lessons. Generated by: generate-kit-audio-v2.ts (concat + atempo=0.85)
#
# Format per example:
#   1. natural utterance of pt (or pt_tts if present)
#   2. same utterance slowed to 0.85x via ffmpeg atempo
#   3. "Which means: en."
#
# Silences between segments are handled by the generator. Just define the content.

chapter_folder: Chapter_01_Rhythm_Stress

lessons:

  Lesson_01:
    title: "Default stress rule — words ending in A, E, or O"
    intro_en: "In Portuguese, words ending in the vowels A, E, or O have the stress on the second-to-last syllable."
    examples:
      - { pt: "banana", en: "banana" }
      - { pt: "casa", pt_tts: "caza", en: "house" }
      - { pt: "cadeira", en: "chair" }
      - { pt: "escola", pt_tts: "iscola", en: "school" }
      - { pt: "jogo", en: "game" }
    outro_en: null

  Lesson_02:
    title: "Other endings and accent overrides"
    intro_en: "Words ending in other letters have the stress on the last syllable. And accent marks always override the rule."
    examples:
      - { pt: "hotel", en: "hotel" }
      - { pt: "Brasil", en: "Brazil" }
      - { pt: "falar", en: "to speak" }
      - { pt: "café", en: "coffee" }
      - { pt: "sabiá", en: "sabiá, a Brazilian bird" }
    outro_en: null

  Lesson_03:
    title: "Linking and casual contractions"
    intro_en: "Brazilians blend words together and use casual contractions in natural speech. Listen to these everyday examples."
    examples:
      - { pt: "Como é que?", en: "how come?" }
      - { pt: "Deixa eu ver.", en: "let me see." }
      - { pt: "Você tá bem?", en: "are you well?" }
      - { pt: "Cê tá bem?", en: "are you okay? — the casual version" }
    outro_en: null

  Lesson_04:
    title: "Stress minimal pairs — when stress changes meaning"
    intro_en: "Changing where the stress falls can change the meaning of a word entirely. Listen to these classic pairs."
    examples:
      - { pt: "sábia", en: "a wise woman" }
      - { pt: "sabia", en: "she knew" }
      - { pt: "sabiá", en: "a Brazilian bird" }
      - { pt: "dúvida", en: "doubt — the noun" }
      - { pt: "duvida", en: "she doubts — the verb" }
    outro_en: null
