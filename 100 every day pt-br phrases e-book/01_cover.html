<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeakEasy Portuguese – Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #E8E4DC;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── Cover wrapper — portrait ratio like ebook pages ── */
  .cover {
    width: 420px;
    min-height: 720px;
    background: #F5F0E8;
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    animation: fadeIn 0.6s ease both;
  }

  /* ── Top green header band ── */
  .top-band {
    background: #1E4D3B;
    padding: 22px 28px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    z-index: 2;
  }
  .top-band::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }

  /* Logo area */
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: #F5F0E8;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .logo-text {}
  .logo-name {
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
  }
  .logo-sub {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  .top-band-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7EC8A4;
  }

  /* ── Illustration area ── */
  .illustration-area {
    background: #F5F0E8;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 28px 0;
    position: relative;
  }

  /* Christ the Redeemer — SVG illustration */
  .christ-wrap {
    animation: float 4s ease-in-out infinite;
    margin-bottom: 28px;
  }

  /* ── Main text block ── */
  .text-block {
    width: 100%;
    text-align: center;
    padding: 0 20px;
    animation: fadeUp 0.7s ease 0.2s both;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #7EC8A4;
    margin-bottom: 8px;
  }

  .main-title {
    font-family: 'Poppins', sans-serif;
    font-size: 46px;
    font-weight: 800;
    color: #1E4D3B;
    line-height: 0.95;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #2D6B52;
    margin-bottom: 18px;
  }

  .divider {
    width: 40px;
    height: 3px;
    background: #A8E6C3;
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .subtitle-line {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #1E4D3B;
    margin-bottom: 6px;
  }

  .subtitle-desc {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #8FA897;
    line-height: 1.5;
  }

  /* ── Decorative elements ── */
  .parrot {
    position: absolute;
    right: 16px;
    bottom: 90px;
    font-size: 56px;
    animation: float 5s ease-in-out 1s infinite;
    transform-origin: center;
  }

  .brasilia {
    position: absolute;
    left: 10px;
    bottom: 70px;
    font-size: 40px;
    opacity: 0.5;
  }

  /* ── Bottom footer band ── */
  .footer-band {
    background: #1E4D3B;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    position: relative;
    z-index: 2;
  }

  .footer-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #7EC8A4;
  }

  .footer-text {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  .footer-text.highlight {
    color: #7EC8A4;
    font-weight: 600;
  }

  /* ── 100 badge ── */
  .badge-100 {
    position: absolute;
    top: 24px;
    right: 24px;
    background: #1E4D3B;
    color: #A8E6C3;
    font-family: 'Poppins', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 5px 12px;
    border-radius: 20px;
    z-index: 3;
  }
</style>
</head>
<body>

<div class="cover">

  <!-- Top green band with logo -->
  <div class="top-band">
    <div class="logo">
      <div class="logo-icon">🔑</div>
      <div class="logo-text">
        <div class="logo-name">SpeakEasy</div>
        <div class="logo-sub">Portuguese</div>
      </div>
    </div>
    <div class="top-band-label">Free PDF</div>
  </div>

  <!-- Illustration + main content -->
  <div class="illustration-area">

    <!-- Badge -->
    <div class="badge-100">100 phrases</div>

    <!-- Christ the Redeemer SVG -->
    <div class="christ-wrap">
      <svg width="130" height="160" viewBox="0 0 130 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <rect x="58" y="70" width="14" height="55" rx="4" fill="#1E4D3B" opacity="0.15" stroke="#1E4D3B" stroke-width="1.5"/>
        <!-- Arms -->
        <rect x="10" y="82" width="110" height="10" rx="5" fill="#1E4D3B" opacity="0.15" stroke="#1E4D3B" stroke-width="1.5"/>
        <!-- Head -->
        <circle cx="65" cy="60" r="12" fill="#F5F0E8" stroke="#1E4D3B" stroke-width="1.5"/>
        <!-- Robe details -->
        <path d="M58 95 Q50 115 45 125 L85 125 Q80 115 72 95Z" fill="#1E4D3B" opacity="0.1" stroke="#1E4D3B" stroke-width="1.2"/>
        <!-- Pedestal -->
        <rect x="50" y="125" width="30" height="8" rx="2" fill="#1E4D3B" opacity="0.2" stroke="#1E4D3B" stroke-width="1"/>
        <rect x="44" y="133" width="42" height="6" rx="2" fill="#1E4D3B" opacity="0.15" stroke="#1E4D3B" stroke-width="1"/>
        <!-- Hands -->
        <circle cx="10" cy="87" r="4" fill="#F5F0E8" stroke="#1E4D3B" stroke-width="1.2"/>
        <circle cx="120" cy="87" r="4" fill="#F5F0E8" stroke="#1E4D3B" stroke-width="1.2"/>
        <!-- Face details -->
        <circle cx="61" cy="59" r="1.5" fill="#1E4D3B" opacity="0.4"/>
        <circle cx="69" cy="59" r="1.5" fill="#1E4D3B" opacity="0.4"/>
        <path d="M62 64 Q65 67 68 64" stroke="#1E4D3B" stroke-width="1" fill="none" opacity="0.4"/>
      </svg>
    </div>

    <!-- Main text -->
    <div class="text-block">
      <div class="eyebrow">100 every day</div>
      <div class="main-title">Brazilian<br>Portuguese<br>Phrases</div>
      <div class="tagline">You'll actually use</div>
      <div class="divider"></div>
      <div class="subtitle-line">PT-BR + English translations + Quick practice tips</div>
      <div class="subtitle-desc">Made for English speakers who want to start speaking today</div>
    </div>

    <!-- Decorative parrot -->
    <div class="parrot">🦜</div>

    <!-- Decorative Brasília skyline (text placeholder) -->
    <div class="brasilia">🏛️</div>

  </div>

  <!-- Bottom footer band -->
  <div class="footer-band">
    <span class="footer-text">@speakeasyptbr</span>
    <div class="footer-dot"></div>
    <span class="footer-text highlight">speakeasyptbr.com</span>
  </div>

</div>

</body>
</html>
